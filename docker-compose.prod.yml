services:
    app:
        image: ghcr.io/${GITHUB_REPOSITORY:-zeromonad/ecommerce}:latest
        build:
            context: .
            dockerfile: Dockerfile
        environment:
            APP_NAME: "${APP_NAME:-ZeroMonad}"
            APP_ENV: production
            APP_KEY: "${APP_KEY}"
            APP_DEBUG: "false"
            APP_URL: "${APP_URL}"
            LOG_CHANNEL: stderr
            LOG_LEVEL: "${LOG_LEVEL:-error}"
            DB_HOST: mysql
            DB_DATABASE: "${DB_DATABASE:-zeromonad}"
            DB_USERNAME: "${DB_USERNAME}"
            DB_PASSWORD: "${DB_PASSWORD}"
            REDIS_HOST: redis
            QUEUE_CONNECTION: redis
            CACHE_STORE: redis
            SESSION_DRIVER: redis
            SESSION_SECURE_COOKIE: "true"
            MAIL_MAILER: "${MAIL_MAILER:-smtp}"
            MAIL_SCHEME: "${MAIL_SCHEME:-tls}"
            MAIL_HOST: "${MAIL_HOST}"
            MAIL_PORT: "${MAIL_PORT:-587}"
            MAIL_USERNAME: "${MAIL_USERNAME}"
            MAIL_PASSWORD: "${MAIL_PASSWORD}"
            MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS}"
            OPENAI_API_KEY: "${OPENAI_API_KEY}"
            ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
            GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
            GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
            GOOGLE_REDIRECT_URI: "${APP_URL}/auth/google/callback"
            STRIPE_KEY: "${STRIPE_KEY}"
            STRIPE_SECRET: "${STRIPE_SECRET}"
            STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET}"
            VIVA_MERCHANT_ID: "${VIVA_MERCHANT_ID}"
            VIVA_API_KEY: "${VIVA_API_KEY}"
            VIVA_CLIENT_ID: "${VIVA_CLIENT_ID}"
            VIVA_CLIENT_SECRET: "${VIVA_CLIENT_SECRET}"
            VIVA_SANDBOX: "${VIVA_SANDBOX:-false}"
            CARDLINK_MERCHANT_ID: "${CARDLINK_MERCHANT_ID}"
            CARDLINK_SHARED_SECRET: "${CARDLINK_SHARED_SECRET}"
            CARDLINK_SANDBOX: "${CARDLINK_SANDBOX:-false}"
        volumes:
            - storage_data:/var/www/html/storage/app
            - logs_data:/var/www/html/storage/logs
        ports:
            - '80:80'
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped

    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
            MYSQL_DATABASE: "${DB_DATABASE:-zeromonad}"
            MYSQL_USER: "${DB_USERNAME}"
            MYSQL_PASSWORD: "${DB_PASSWORD}"
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    redis:
        image: redis:7-alpine
        volumes:
            - redis_data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 3s
            retries: 3
        restart: unless-stopped

volumes:
    storage_data:
    logs_data:
    mysql_data:
    redis_data:
